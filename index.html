<!DOCTYPE html>
<html>
<head>
<title>Evolvit Club</title>
<link rel="stylesheet" href="css/style.css">
<style>
.hero{
  height:90vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:radial-gradient(circle at top,#1a2a6c,#0b0f1a);
}

.hero h1{
  font-size:50px;
  letter-spacing:2px;
}

.hero p{
  color:#9aa3c7;
  margin:10px 0 20px;
}

.buttons button{
  margin:10px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  cursor:pointer;
  font-weight:bold;
}

.explore-btn{
  background:linear-gradient(90deg,#6c8cff,#00e0b8);
  color:black;
}

.join-btn{
  background:transparent;
  border:1px solid #6c8cff;
  color:white;
}
</style>
</head>

<body>

<header>
<div class="nav">
<h2>Evolvit Club</h2>
</div>
</header>

<div class="hero">
  <div>
    <h1>EVOLVIT CLUB 🚀</h1>
    <p>Evolving Students into Real-World Innovators</p>

    <div class="buttons">
      <button class="explore-btn" onclick="goToPage('explore.html')">Explore</button>
      <button class="join-btn" onclick="goToPage('join.html')">Join Now</button>
    </div>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
